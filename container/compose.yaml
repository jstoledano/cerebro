# ─────────────────────────────────────────────
# cerebro — compose.yaml (Modo Host para Estabilidad)
# ─────────────────────────────────────────────
name: cerebro

services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: sherpa-db
    network_mode: "host"  # <--- Esto elimina la necesidad de DNS interno
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sherpa
      - POSTGRES_USER=sherpa
      - POSTGRES_PASSWORD=el-charro-negro
    volumes:
      - sherpa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherpa"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: Containerfile
    container_name: sherpa-web
    network_mode: "host"  # <--- Ambos comparten la red de AlmaLinux
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.container
    volumes:
      - ../src:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --name sherpa --workers 3 --bind 0.0.0.0:8000"

volumes:
  sherpa-pgdata: