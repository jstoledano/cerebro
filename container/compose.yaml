# ─────────────────────────────────────────────
# sherpa — compose.yaml
# Podman rootless compatible
# Uso: podman-compose up -d
# ─────────────────────────────────────────────

name: sherpa

services:

  db:
    image: postgres:16-alpine
    container_name: sherpa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sherpa}
      POSTGRES_USER: ${DB_USER:-sherpa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sherpa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sherpa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: container/Containerfile
    container_name: sherpa-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.container
    volumes:
      # Media persistente (PDFs de revisiones)
      - sherpa-media:/app/media
      # Static (opcional si nginx sirve desde aquí)
      - sherpa-static:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application
             --name sherpa
             --workers 3
             --bind 0.0.0.0:8000
             --access-logfile -
             --error-logfile -
             --log-level info"

volumes:
  sherpa-pgdata:
  sherpa-media:
  sherpa-static:
