# ─────────────────────────────────────────────
# cerebro — compose.yaml optimizado
# ─────────────────────────────────────────────
name: cerebro

services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: sherpa-db
    restart: unless-stopped
    environment:
      # Inyección directa para asegurar que Postgres siempre arranque
      - POSTGRES_DB=sherpa
      - POSTGRES_USER=sherpa
      - POSTGRES_PASSWORD=el-charro-negro
    volumes:
      - sherpa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherpa"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: Containerfile
    container_name: sherpa-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.container
    volumes:
      # Sincronización en tiempo real del código para desarrollo
      - ../src:/app
    ports:
      - "127.0.0.1:8000:8000"
    # El comando realiza las tareas de Django antes de iniciar Gunicorn
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --name sherpa --workers 3 --bind 0.0.0.0:8000"

volumes:
  sherpa-pgdata:
